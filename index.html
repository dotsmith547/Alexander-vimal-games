<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlexanderVimal Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d1a;
  color:white;
  text-align:center;
}
section{padding:60px 10px;}
canvas{
  background:black;
  border:2px solid #444;
  border-radius:10px;
  margin-top:10px;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#e94560;
  color:white;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>⚡ AlexanderVimal Games</h1>

<!-- ================= PACMAN ================= -->
<section>
<h2>Pac-Man (Ghost Game)</h2>
<canvas id="pacman" width="300" height="300"></canvas><br>
<button onclick="startPacman()">Start Pac-Man</button>
</section>

<!-- ================= AMIT SUFFERS ================= -->
<section>
<h2>AMIT SUFFERS (Runner Game)</h2>
<canvas id="amit" width="300" height="300"></canvas><br>
<button onclick="startRunner()">Start Game</button>
</section>

<script>

/* ================= PACMAN ================= */
function startPacman(){

const c = document.getElementById("pacman");
const ctx = c.getContext("2d");

let player = {x:30,y:30,dx:30,dy:0};

let ghosts = [
  {x:240,y:30,vx:1,vy:0,color:"red"},
  {x:240,y:240,vx:-1,vy:0,color:"blue"},
  {x:30,y:240,vx:1,vy:1,color:"green"}
];

// control
document.onkeydown = (e)=>{
  if(e.key=="ArrowRight") player.dx=3,player.dy=0;
  if(e.key=="ArrowLeft") player.dx=-3,player.dy=0;
  if(e.key=="ArrowUp") player.dx=0,player.dy=-3;
  if(e.key=="ArrowDown") player.dx=0,player.dy=3;
};

function drawMaze(){
  ctx.strokeStyle="#222";
  for(let i=0;i<300;i+=30){
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,300);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(300,i);ctx.stroke();
  }
}

function loop(){
ctx.clearRect(0,0,300,300);

drawMaze();

// player
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(player.x,player.y,10,0,Math.PI*2);
ctx.fill();

player.x += player.dx;
player.y += player.dy;

// walls boundary
if(player.x<10)player.x=10;
if(player.y<10)player.y=10;
if(player.x>290)player.x=290;
if(player.y>290)player.y=290;

// ghosts
ghosts.forEach(g=>{
ctx.fillStyle=g.color;
ctx.fillRect(g.x,g.y,15,15);

g.x += g.vx;
g.y += g.vy;

// bounce
if(g.x<0||g.x>285) g.vx*=-1;
if(g.y<0||g.y>285) g.vy*=-1;
});

requestAnimationFrame(loop);
}
loop();
}

/* ================= AMIT SUFFERS ================= */
function startRunner(){

const c = document.getElementById("amit");
const ctx = c.getContext("2d");

let playerY = 250;
let jump = false;

let obstacles = [
  {x:300},{x:450},{x:600}
];

document.onkeydown = (e)=>{
  if(e.code=="Space" && !jump){
    jump=true;
    playerY=180;
    setTimeout(()=>{playerY=250;jump=false;},400);
  }
};

function loop(){
ctx.clearRect(0,0,300,300);

// ground
ctx.fillStyle="green";
ctx.fillRect(0,270,300,30);

// player
ctx.fillStyle="cyan";
ctx.fillRect(50,playerY,20,20);

// obstacles
ctx.fillStyle="red";
obstacles.forEach(o=>{
o.x -= 4;

ctx.fillRect(o.x,250,20,20);

// reset
if(o.x<-20){
o.x=300+Math.random()*200;
}
});

requestAnimationFrame(loop);
}
loop();
}

</script>

</body>
</html>
