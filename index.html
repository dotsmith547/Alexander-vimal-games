<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlexanderVimal Games</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{margin:0;font-family:Nunito;background:#0d0d1a;color:#fff;overflow-x:hidden;}
    nav{position:fixed;top:0;width:100%;background:#111;padding:10px;z-index:100;}
    .section-pad{padding:80px 20px;text-align:center;}
    .section-title{font-size:28px;font-weight:800;}
    .section-tag{color:#e94560;font-size:12px;letter-spacing:2px;}
    .btn-primary{background:#e94560;color:#fff;padding:10px 20px;border:none;border-radius:25px;cursor:pointer;}
    canvas{background:black;border-radius:10px;margin-top:20px;}
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  ⚡ AlexanderVimal Games
</nav>

<!-- HERO (YOUR ORIGINAL KEEP AREA) -->
<section class="section-pad">
  <h1 class="section-title">Level Up Your Gaming Experience</h1>
  <p>Welcome to AlexanderVimal Games</p>
</section>

<!-- ================= PACMAN ================= -->
<section id="game" class="section-pad">
  <div class="section-tag">Mini Game</div>
  <h2 class="section-title">Pac-Man</h2>

  <canvas id="pacman" width="300" height="300"></canvas><br>
  <button class="btn-primary" onclick="startPacman()">Start Pac-Man</button>
</section>

<!-- ================= AMIT SUFFERS ================= -->
<section class="section-pad">
  <div class="section-tag">New Game</div>
  <h2 class="section-title">AMIT SUFFERS</h2>

  <canvas id="amit" width="300" height="300"></canvas><br>
  <button class="btn-primary" onclick="startAmit()">Start Game</button>
</section>

<!-- ================= SCRIPT ================= -->
<script>

/* PACMAN */
function startPacman(){
  const c=document.getElementById("pacman");
  const ctx=c.getContext("2d");

  let x=20;

  function loop(){
    ctx.clearRect(0,0,300,300);

    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(x,100,15,0,Math.PI*2);
    ctx.fill();

    x+=3;
    if(x>300) x=0;

    requestAnimationFrame(loop);
  }
  loop();
}

/* AMIT SUFFERS RUNNER */
function startAmit(){
  const c=document.getElementById("amit");
  const ctx=c.getContext("2d");

  let px=50;
  let py=250;
  let ox=300;

  document.onkeydown=(e)=>{
    if(e.code==="Space") py=180;
    setTimeout(()=>py=250,300);
  }

  function loop(){
    ctx.clearRect(0,0,300,300);

    // ground
    ctx.fillStyle="green";
    ctx.fillRect(0,270,300,30);

    // player
    ctx.fillStyle="cyan";
    ctx.fillRect(px,py,20,20);

    // obstacle
    ctx.fillStyle="red";
    ctx.fillRect(ox,250,20,20);

    ox-=4;
    if(ox<0) ox=300;

    requestAnimationFrame(loop);
  }
  loop();
}

</script>

</body>
</html>
