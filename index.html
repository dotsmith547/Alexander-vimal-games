<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlexanderVimal Games</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Arial;background:#0d0d1a;color:white;}
.section-pad{padding:50px 20px;}
.section-title{font-size:28px;font-weight:bold;text-align:center;}
.glass{background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;margin:20px auto;max-width:900px;}
canvas{display:block;margin:auto;background:black;border-radius:10px;}
.btn{padding:8px 16px;margin:5px;background:#e94560;border:none;color:white;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="section-pad">
  <h1 class="section-title">⚡ AlexanderVimal Games</h1>
</div>

<!-- ================= PACMAN ================= -->
<div class="glass">
<h2 style="text-align:center;">🟡 PAC-MAN ULTRA PRO MAX</h2>
<canvas id="pac" width="320" height="320"></canvas>

<div style="text-align:center;margin-top:10px;">
<button class="btn" onclick="move('up')">⬆️</button>
<button class="btn" onclick="move('left')">⬅️</button>
<button class="btn" onclick="move('down')">⬇️</button>
<button class="btn" onclick="move('right')">➡️</button>
</div>
</div>

<!-- ================= RUNNER ================= -->
<div class="glass">
<h2 style="text-align:center;">🏃 AMIT SUFFERS ULTRA PRO MAX</h2>
<canvas id="run" width="320" height="200"></canvas>
</div>

<script>

/* ================= PACMAN ================= */

const pac = document.getElementById("pac");
const ctx = pac.getContext("2d");

let p = {x:160,y:160,dir:"right",score:0};

let ghosts = [
{x:30,y:30,c:"red"},
{x:280,y:30,c:"blue"},
{x:30,y:280,c:"green"}
];

// maze walls
let walls = [
{x:0,y:0,w:320,h:10},
{x:0,y:310,w:320,h:10},
{x:0,y:0,w:10,h:320},
{x:310,y:0,w:10,h:320},
{x:120,y:60,w:10,h:200},
{x:200,y:60,w:10,h:200}
];

function move(d){p.dir=d;}

document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowUp")p.dir="up";
if(e.key=="ArrowDown")p.dir="down";
if(e.key=="ArrowLeft")p.dir="left";
if(e.key=="ArrowRight")p.dir="right";
});

function drawPac(){

ctx.clearRect(0,0,320,320);

// walls
ctx.fillStyle="gray";
walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

// pacman
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(p.x,p.y,10,0,Math.PI*2);
ctx.fill();

// ghosts AI
ghosts.forEach(g=>{
ctx.fillStyle=g.c;
ctx.fillRect(g.x,g.y,15,15);

if(g.x<p.x)g.x+=0.7;
if(g.x>p.x)g.x-=0.7;
if(g.y<p.y)g.y+=0.7;
if(g.y>p.y)g.y-=0.7;
});

// movement
if(p.dir=="right")p.x+=2;
if(p.dir=="left")p.x-=2;
if(p.dir=="up")p.y-=2;
if(p.dir=="down")p.y+=2;

// loop
if(p.x<0)p.x=320;
if(p.x>320)p.x=0;
if(p.y<0)p.y=320;
if(p.y>320)p.y=0;

requestAnimationFrame(drawPac);
}
drawPac();


/* ================= RUNNER GAME ================= */

const r = document.getElementById("run");
const rctx = r.getContext("2d");

let player = {x:50,y:150,vy:0,ground:true};
let obs = [{x:320,y:150},{x:500,y:150}];

document.addEventListener("keydown",(e)=>{
if(e.code=="Space")jump();
});

function jump(){
if(player.ground){
player.vy=-8;
player.ground=false;
}
}

function run(){

rctx.clearRect(0,0,320,200);

// ground
rctx.fillStyle="white";
rctx.fillRect(0,170,320,2);

// player
rctx.fillStyle="cyan";
rctx.fillRect(player.x,player.y,15,15);

// physics
player.y+=player.vy;
player.vy+=0.4;

if(player.y>=150){
player.y=150;
player.ground=true;
}

// obstacles
obs.forEach(o=>{
rctx.fillStyle="red";
rctx.fillRect(o.x,o.y,15,15);

o.x-=3;
if(o.x<0)o.x=320+Math.random()*200;
});

requestAnimationFrame(run);
}
run();

</script>
<script>

/* ================= PACMAN PRO FIXED ================= */

const canvas = document.getElementById("pacmanCanvas");
const ctx = canvas.getContext("2d");

let gameOver = false;

let pac = {
  x: 160,
  y: 160,
  r: 10,
  dir: "right",
  speed: 2,
  alive: true
};

let ghosts = [
  {x: 40, y: 40, c: "red"},
  {x: 280, y: 40, c: "blue"},
  {x: 40, y: 280, c: "green"}
];

// controls
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp") pac.dir="up";
  if(e.key==="ArrowDown") pac.dir="down";
  if(e.key==="ArrowLeft") pac.dir="left";
  if(e.key==="ArrowRight") pac.dir="right";
});

function movePac(d){pac.dir=d;}

function resetGame(){
  pac.x=160;
  pac.y=160;
  pac.alive=true;
  gameOver=false;

  ghosts=[
    {x:40,y:40,c:"red"},
    {x:280,y:40,c:"blue"},
    {x:40,y:280,c:"green"}
  ];
}

function collision(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y)<15;
}

function update(){

if(!pac.alive){
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("GAME OVER",100,160);
  ctx.fillText("Press R to Restart",70,190);
  return;
}

// movement
if(pac.dir==="right") pac.x+=pac.speed;
if(pac.dir==="left") pac.x-=pac.speed;
if(pac.dir==="up") pac.y-=pac.speed;
if(pac.dir==="down") pac.y+=pac.speed;

// loop screen
if(pac.x>320) pac.x=0;
if(pac.x<0) pac.x=320;
if(pac.y>320) pac.y=0;
if(pac.y<0) pac.y=320;

// ghost AI
ghosts.forEach(g=>{
  if(g.x<pac.x) g.x+=1;
  if(g.x>pac.x) g.x-=1;
  if(g.y<pac.y) g.y+=1;
  if(g.y>pac.y) g.y-=1;

  // collision kill
  if(collision(pac,g)){
    pac.alive=false;
  }
});

}

function draw(){

ctx.clearRect(0,0,320,320);

// pacman
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(pac.x,pac.y,10,0,Math.PI*2);
ctx.fill();

// ghosts
ghosts.forEach(g=>{
ctx.fillStyle=g.c;
ctx.fillRect(g.x,g.y,15,15);
});

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

// restart key
document.addEventListener("keydown",(e)=>{
if(e.key==="r" || e.key==="R"){
resetGame();
}
});

</script>

</body>
</html>
